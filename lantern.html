<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light a Lantern — Hyemyung</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0806;
  --gold: #c9923a;
  --gold-light: #e8b96a;
  --red: #8b1a1a;
  --red-glow: rgba(180, 60, 20, 0.4);
  --paper: #f5e6c8;
  --text: #f0e0c0;
  --muted: #9a8060;
  --candle: #ff9933;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow-x: hidden;
}

/* Temple background */
.temple-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Ceiling pattern */
.ceiling {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(180deg, #1a0f08 0%, #0d0806 100%);
  border-bottom: 1px solid rgba(180,100,20,0.2);
}

/* Hanging lanterns in background */
.bg-lanterns {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding: 0 10px;
  flex-wrap: wrap;
}

.bg-lantern {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: -8px;
}

.bg-lantern-string {
  width: 1px;
  height: 20px;
  background: rgba(180,140,60,0.4);
}

.bg-lantern-body {
  width: 28px;
  height: 32px;
  border-radius: 50% 50% 45% 45%;
  position: relative;
  box-shadow: 0 0 12px var(--red-glow);
}

.bg-lantern-tag {
  width: 6px;
  height: 18px;
  background: rgba(200,220,80,0.5);
  margin-top: 2px;
  border-radius: 1px;
}

/* Floor */
.floor {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(180deg, #0d0806 0%, #1a1008 60%, #221408 100%);
}

/* Candle row */
.candles-row {
  position: absolute;
  bottom: 30%;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 0 20px;
}

.candle-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.candle-flame {
  width: 4px;
  height: 8px;
  background: var(--candle);
  border-radius: 50% 50% 30% 30%;
  box-shadow: 0 0 6px 2px rgba(255,153,51,0.6), 0 0 12px 4px rgba(255,100,0,0.3);
  animation: flicker 1.5s ease-in-out infinite alternate;
}

.candle-body {
  width: 6px;
  height: 20px;
  background: linear-gradient(180deg, #e8d8b0 0%, #c8b890 100%);
  border-radius: 1px;
}

@keyframes flicker {
  0% { transform: scaleX(1) scaleY(1) translateX(0); opacity: 1; }
  25% { transform: scaleX(0.8) scaleY(1.1) translateX(-1px); opacity: 0.9; }
  50% { transform: scaleX(1.1) scaleY(0.9) translateX(1px); opacity: 1; }
  75% { transform: scaleX(0.9) scaleY(1.05) translateX(-0.5px); opacity: 0.95; }
  100% { transform: scaleX(1.05) scaleY(1) translateX(0.5px); opacity: 1; }
}

/* Ambient glow */
.glow-bottom {
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 35%;
  background: radial-gradient(ellipse, rgba(180,80,20,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.glow-candles {
  position: absolute;
  bottom: 28%;
  left: 0; right: 0;
  height: 15%;
  background: radial-gradient(ellipse, rgba(255,140,40,0.08) 0%, transparent 60%);
  pointer-events: none;
}

/* Main content */
.container {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 24px 80px;
}

header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeDown 1.2s ease both;
}

.site-tag {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0.7;
}

h1 {
  font-size: clamp(32px, 6vw, 52px);
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.06em;
  line-height: 1.2;
  margin-bottom: 12px;
}

h1 em {
  font-style: italic;
  color: var(--gold-light);
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 0.1em;
  line-height: 1.8;
}

.divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(180deg, transparent, var(--gold), transparent);
  margin: 0 auto 40px;
}

/* Input section */
.input-section {
  width: 100%;
  max-width: 480px;
  text-align: center;
  animation: fadeUp 1s 0.3s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.input-label {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.12em;
  margin-bottom: 16px;
  display: block;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.input-group input, .input-group textarea {
  background: rgba(20,12,8,0.8);
  border: 1px solid rgba(180,120,40,0.3);
  border-radius: 4px;
  padding: 14px 18px;
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  width: 100%;
  backdrop-filter: blur(4px);
}

.input-group textarea {
  resize: none;
  height: 80px;
  line-height: 1.6;
}

.input-group input:focus, .input-group textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(200,140,50,0.15);
}

.input-group input::placeholder, .input-group textarea::placeholder {
  color: rgba(154,128,96,0.5);
  font-style: italic;
}

.light-btn {
  background: transparent;
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 14px 40px;
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
}

.light-btn:hover {
  background: rgba(200,140,50,0.1);
  box-shadow: 0 0 30px rgba(200,140,50,0.2);
  transform: translateY(-1px);
}

/* Lantern display */
.lantern-stage {
  width: 100%;
  max-width: 560px;
  margin-top: 48px;
  display: none;
  animation: fadeUp 0.8s ease both;
}

.lantern-stage.visible { display: block; }

.lantern-scene {
  position: relative;
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
  height: 280px;
}

/* The lantern */
.lantern {
  position: absolute;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: sway 4s ease-in-out infinite;
  transform-origin: top center;
}

@keyframes sway {
  0%, 100% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
}

.lantern-string-top {
  width: 1px;
  height: 40px;
  background: linear-gradient(180deg, rgba(180,140,60,0.6), rgba(180,140,60,0.3));
}

.lantern-body {
  width: 90px;
  height: 110px;
  border-radius: 50% 50% 45% 45%;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(220,100,30,0.5), 0 0 80px rgba(220,100,30,0.2), inset 0 0 30px rgba(255,160,50,0.3);
}

.lantern-inner {
  position: absolute;
  inset: 3px;
  border-radius: 50% 50% 42% 42%;
  background: radial-gradient(ellipse at 40% 40%, rgba(255,200,80,0.4) 0%, rgba(200,80,20,0.8) 60%, rgba(150,40,10,0.9) 100%);
  animation: lanternGlow 2s ease-in-out infinite alternate;
}

@keyframes lanternGlow {
  0% { opacity: 0.85; }
  100% { opacity: 1; }
}

.lantern-ribs {
  position: absolute;
  inset: 0;
  border-radius: 50% 50% 45% 45%;
}

.lantern-rib {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(100,30,10,0.4);
  transform-origin: top center;
}

.lantern-top-cap {
  width: 50px;
  height: 10px;
  background: linear-gradient(180deg, #8b3a10, #6b2a08);
  border-radius: 2px;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.lantern-bottom-cap {
  width: 40px;
  height: 8px;
  background: linear-gradient(180deg, #6b2a08, #4a1a05);
  border-radius: 0 0 4px 4px;
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

/* Name tag */
.lantern-tag-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.lantern-tag-string {
  width: 1px;
  height: 12px;
  background: rgba(180,140,60,0.5);
}

.lantern-tag {
  background: #c8dc40;
  padding: 6px 10px;
  min-width: 44px;
  text-align: center;
  border-radius: 2px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.lantern-tag-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  color: #1a2a0a;
  font-weight: 400;
  display: block;
  line-height: 1.4;
}

.lantern-tag-wish {
  font-family: 'Noto Serif KR', serif;
  font-size: 9px;
  color: #2a4010;
  display: block;
  line-height: 1.4;
  opacity: 0.8;
}

/* Surrounding small lanterns */
.surrounding-lanterns {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.mini-lantern {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0.4;
}

.mini-string { width: 1px; height: 15px; background: rgba(180,140,60,0.3); }
.mini-body {
  width: 24px;
  height: 28px;
  border-radius: 50% 50% 45% 45%;
  box-shadow: 0 0 8px rgba(200,80,20,0.4);
}
.mini-tag { width: 5px; height: 14px; background: rgba(200,220,60,0.4); margin-top: 2px; border-radius: 1px; }

/* Message card */
.wish-message {
  background: rgba(15,10,6,0.85);
  border: 1px solid rgba(180,120,40,0.25);
  border-radius: 4px;
  padding: 28px 32px;
  text-align: center;
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
}

.wish-message::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.wish-quote {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 17px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 16px;
  opacity: 0.9;
}

.wish-attribution {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
  opacity: 0.7;
}

/* Share buttons */
.share-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}

.share-btn {
  background: transparent;
  border: 1px solid rgba(180,120,40,0.3);
  border-radius: 999px;
  padding: 8px 20px;
  color: var(--muted);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 13px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.3s;
}

.share-btn:hover {
  border-color: var(--gold);
  color: var(--gold-light);
  box-shadow: 0 0 16px rgba(200,140,50,0.15);
}

.light-another {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  cursor: pointer;
  margin-top: 20px;
  display: block;
  width: 100%;
  text-align: center;
  transition: color 0.3s;
  text-decoration: underline;
  text-underline-offset: 4px;
}

.light-another:hover { color: var(--text); }

/* Floating particles */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255,180,60,0.6);
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,12,8,0.95);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 10px 24px;
  color: var(--gold-light);
  font-size: 13px;
  letter-spacing: 0.08em;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }

.past-section {
  width: 100%;
  max-width: 480px;
  margin-top: 32px;
  display: none;
  animation: fadeUp 0.8s ease both;
}
.past-title {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.past-item {
  background: rgba(15,10,6,0.7);
  border: 1px solid rgba(180,120,40,0.15);
  border-radius: 4px;
  padding: 14px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.3s;
}
.past-item:hover { border-color: rgba(180,120,40,0.4); }
.past-date { font-size: 10px; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 4px; opacity: 0.7; }
.past-name { font-size: 15px; color: var(--text); margin-bottom: 4px; }
.past-reflection { font-size: 13px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
.past-quote { font-size: 11px; color: rgba(154,128,96,0.6); line-height: 1.5; }


@media (max-width: 480px) {
  .container { padding: 40px 16px 60px; }
  h1 { font-size: 28px; }
}
</style>
</head>
<body>

<!-- Temple atmosphere -->
<div class="temple-bg">
  <div class="ceiling"></div>
  <div class="bg-lanterns" id="bgLanterns"></div>
  <div class="floor"></div>
  <div class="candles-row" id="candlesRow"></div>
  <div class="glow-bottom"></div>
  <div class="glow-candles"></div>
</div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="container">
  <header>
    <p class="site-tag">Hyemyung · Digital Sanctuary</p>
    <h1>Light a<br><em>Lantern</em></h1>
    <div class="divider"></div>
    <p class="subtitle">When you are tired, when you want to give up —<br>come back here. Remember who you were today.</p>
  </header>

  <div class="input-section" id="inputSection">
    <span class="input-label">Your name & wish</span>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="Your name..." maxlength="20" />
      <textarea id="wishInput" placeholder="How are you feeling right now? What are you holding onto?"></textarea>
    </div>
    <button class="light-btn" onclick="lightLantern()">🏮 Keep This Moment</button>
  </div>

  <div class="lantern-stage" id="lanternStage">
    <div class="lantern-scene" id="lanternScene">
      <div class="surrounding-lanterns" id="surroundingLanterns"></div>
      <div class="lantern" id="myLantern">
        <div class="lantern-string-top"></div>
        <div class="lantern-body">
          <div class="lantern-top-cap"></div>
          <div class="lantern-inner"></div>
          <div class="lantern-ribs" id="lanternRibs"></div>
          <div class="lantern-bottom-cap"></div>
        </div>
        <div class="lantern-tag-wrap">
          <div class="lantern-tag-string"></div>
          <div class="lantern-tag">
            <span class="lantern-tag-name" id="tagName"></span>
            <span class="lantern-tag-wish" id="tagWish"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="wish-message">
      <p class="wish-quote" id="wishQuote"></p>
      <p class="wish-attribution">— Hyemyung</p>
    </div>

    <div class="share-row">
      <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
      <button class="share-btn" onclick="shareTwitter()">𝕏 Share</button>
    </div>

    <button class="light-another" onclick="resetForm()">Light another lantern</button>
  </div>
</div>


  <div class="past-section" id="pastSection">
    <p class="past-title">Your lanterns</p>
    <div id="pastList"></div>
  </div>

<div class="toast" id="toast"></div>

<script>
const lanternColors = [
  { outer: 'linear-gradient(135deg, #8b1a1a, #c03020)', inner: 'radial-gradient(ellipse at 40% 40%, rgba(255,200,80,0.4) 0%, rgba(200,80,20,0.8) 60%, rgba(150,40,10,0.9) 100%)' },
  { outer: 'linear-gradient(135deg, #1a4a8b, #2060c0)', inner: 'radial-gradient(ellipse at 40% 40%, rgba(180,220,255,0.4) 0%, rgba(40,100,200,0.8) 60%, rgba(20,60,150,0.9) 100%)' },
  { outer: 'linear-gradient(135deg, #2a7a30, #40a050)', inner: 'radial-gradient(ellipse at 40% 40%, rgba(180,255,180,0.4) 0%, rgba(40,160,60,0.8) 60%, rgba(20,100,30,0.9) 100%)' },
  { outer: 'linear-gradient(135deg, #7a4a1a, #c07030)', inner: 'radial-gradient(ellipse at 40% 40%, rgba(255,220,120,0.4) 0%, rgba(200,130,40,0.8) 60%, rgba(140,80,20,0.9) 100%)' },
];

const quotes = [
  "This moment is now kept safe. When you are tired and ready to give up — come back here. The person who lit this lantern was real, and they were trying.",
  "You don't need to know what comes next. You only need to remember that you were here, that you felt this, and that it mattered.",
  "On the days that exhaust you — recall this light. It was lit by you, on a day when you still believed something was worth holding onto.",
  "This is not a wish. This is a record. A quiet proof that today, you showed up for yourself.",
  "You are already enduring more than most will ever see. This lantern is not a prayer for the future — it is a witness to who you are right now.",
  "When the road ahead feels too long, look back at this moment. You were here. You were enough. You still are.",
];

function buildBackground() {
  const bgLanterns = document.getElementById('bgLanterns');
  const colors = ['#8b1a1a','#c03020','#1a4a8b','#2a7a30','#7a3010','#c07030'];
  for (let i = 0; i < 40; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'bg-lantern';
    wrap.style.marginTop = Math.random() * 20 + 'px';
    const color = colors[Math.floor(Math.random() * colors.length)];
    wrap.innerHTML = `
      <div class="bg-lantern-string"></div>
      <div class="bg-lantern-body" style="background:${color}; opacity:${0.4 + Math.random()*0.4}"></div>
      <div class="bg-lantern-tag"></div>
    `;
    bgLanterns.appendChild(wrap);
  }

  const candlesRow = document.getElementById('candlesRow');
  for (let i = 0; i < 18; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'candle-wrap';
    const delay = Math.random() * 1.5;
    const dur = 1 + Math.random() * 1;
    wrap.innerHTML = `
      <div class="candle-flame" style="animation-delay:${delay}s; animation-duration:${dur}s"></div>
      <div class="candle-body" style="height:${14+Math.random()*12}px"></div>
    `;
    candlesRow.appendChild(wrap);
  }
}

function buildParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = 0.3 + Math.random() * 0.4;
    container.appendChild(p);
  }
}

function buildLanternRibs() {
  const ribs = document.getElementById('lanternRibs');
  for (let i = 0; i < 6; i++) {
    const rib = document.createElement('div');
    rib.className = 'lantern-rib';
    rib.style.left = (15 + i * 14) + '%';
    ribs.appendChild(rib);
  }
}

function buildSurroundingLanterns() {
  const container = document.getElementById('surroundingLanterns');
  const positions = [
    {left:'5%', top:'10px'}, {left:'15%', top:'0px'}, {left:'75%', top:'5px'},
    {left:'85%', top:'0px'}, {left:'70%', top:'30px'}, {left:'20%', top:'25px'},
    {left:'90%', top:'40px'}, {left:'2%', top:'50px'},
  ];
  const colors = ['#8b1a1a','#1a4a8b','#2a7a30','#7a3010'];
  positions.forEach(pos => {
    const wrap = document.createElement('div');
    wrap.className = 'mini-lantern';
    wrap.style.left = pos.left;
    wrap.style.top = pos.top;
    const color = colors[Math.floor(Math.random() * colors.length)];
    wrap.innerHTML = `<div class="mini-string"></div><div class="mini-body" style="background:${color}"></div><div class="mini-tag"></div>`;
    container.appendChild(wrap);
  });
}

function saveLantern(name, reflection, quote, colorIdx) {
  const records = JSON.parse(localStorage.getItem('hyemyung_lanterns') || '[]');
  records.unshift({ name, reflection, quote, colorIdx, date: new Date().toISOString() });
  if (records.length > 20) records.pop();
  localStorage.setItem('hyemyung_lanterns', JSON.stringify(records));
}

function loadPastLanterns() {
  const records = JSON.parse(localStorage.getItem('hyemyung_lanterns') || '[]');
  if (records.length === 0) return;
  const section = document.getElementById('pastSection');
  const list = document.getElementById('pastList');
  list.innerHTML = '';
  records.forEach(r => {
    const date = new Date(r.date);
    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const div = document.createElement('div');
    div.className = 'past-item';
    div.innerHTML = `<div class="past-date">${dateStr}</div><div class="past-name">${r.name}</div><div class="past-reflection">${r.reflection || '—'}</div><div class="past-quote">"${r.quote.slice(0,60)}..."</div>`;
    div.onclick = () => showPastLantern(r);
    list.appendChild(div);
  });
  section.style.display = 'block';
}

function showPastLantern(r) {
  const color = lanternColors[r.colorIdx] || lanternColors[0];
  document.getElementById('tagName').textContent = r.name;
  document.getElementById('tagWish').textContent = r.reflection ? (r.reflection.length > 16 ? r.reflection.slice(0,16)+'...' : r.reflection) : '';
  document.getElementById('wishQuote').textContent = r.quote;
  document.querySelector('.lantern-body').style.background = color.outer;
  document.querySelector('.lantern-inner').style.background = color.inner;
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('pastSection').style.display = 'none';
  const stage = document.getElementById('lanternStage');
  stage.classList.add('visible');
  stage.style.animation = 'fadeUp 0.8s ease both';
}

function lightLantern() {
  const name = document.getElementById('nameInput').value.trim();
  const reflection = document.getElementById('wishInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); showToast('Please enter your name'); return; }
  const colorIdx = Math.floor(Math.random() * lanternColors.length);
  const color = lanternColors[colorIdx];
  const quote = quotes[Math.floor(Math.random() * quotes.length)];
  saveLantern(name, reflection, quote, colorIdx);
  document.getElementById('tagName').textContent = name;
  document.getElementById('tagWish').textContent = reflection ? (reflection.length > 16 ? reflection.slice(0,16)+'...' : reflection) : '';
  document.getElementById('wishQuote').textContent = quote;
  document.querySelector('.lantern-body').style.background = color.outer;
  document.querySelector('.lantern-inner').style.background = color.inner;
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('pastSection').style.display = 'none';
  const stage = document.getElementById('lanternStage');
  stage.classList.add('visible');
  stage.style.animation = 'none';
  stage.offsetHeight;
  stage.style.animation = 'fadeUp 0.8s ease both';
}

function resetForm() {
  document.getElementById('nameInput').value = '';
  document.getElementById('wishInput').value = '';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('lanternStage').classList.remove('visible');
  loadPastLanterns();
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('✓ Link copied'));
}

function shareTwitter() {
  const name = document.getElementById('tagName').textContent;
  const text = `I lit a lantern for my wish at Hyemyung — a digital sanctuary rooted in Eastern wisdom. 🏮`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent('https://lylaj391xo.github.io/hyemyung/')}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

loadPastLanterns();
buildBackground();
buildParticles();
buildLanternRibs();
buildSurroundingLanterns();
</script>
